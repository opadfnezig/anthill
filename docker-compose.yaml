services:
  redis:
    image: redis:7-alpine
    # No host port — internal only, avoids conflict with scraper redis instances
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy noeviction

  api:
    build: .
    ports:
      - "3100:3100"
    environment:
      ROLE: api
      REDIS_HOST: redis
      PORT: 3100
      RESULT_TTL: 3600
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build: .
    environment:
      ROLE: worker
      REDIS_HOST: redis
      NODE_EXTRA_CA_CERTS: /etc/ssl/certs/ca-certificates.crt
      CONCURRENCY_PER_HOST: 5
      MAX_RATE_PER_HOST: 10
      RATE_DURATION: 1000
      RESULT_TTL: 3600
    depends_on:
      - redis
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    deploy:
      replicas: 2

volumes:
  redis-data:
